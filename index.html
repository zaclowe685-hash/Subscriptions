<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<!-- Add to Home Screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Subs">
<meta name="theme-color" content="#0d0f14">
<meta name="format-detection" content="telephone=no">
<title>Subscriptions</title>
<style>
  :root{
    color-scheme: dark;
    --bg:#0d0f14;
    --surface:#161a22;
    --surface-2:#1e232d;
    --border:#2a2f3a;
    --text:#eceef4;
    --muted:#9aa1b2;
    --accent:#7c6cff;
    --accent-press:#6a59f0;
    --good:#4fd1a1;
    --warn:#ffb454;
    --danger:#ff6b6b;
    --radius:16px;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; }
  body{
    background:var(--bg);
    color:var(--text);
    font:16px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:600px;
    margin:0 auto;
    padding:calc(env(safe-area-inset-top) + 22px) calc(env(safe-area-inset-right) + 16px)
            calc(env(safe-area-inset-bottom) + 40px) calc(env(safe-area-inset-left) + 16px);
  }
  [hidden]{ display:none !important; }
  .muted{ color:var(--muted); }

  header h1{ font-size:26px; margin:0; letter-spacing:-.02em; }
  header p{ margin:4px 0 0; color:var(--muted); font-size:14px; }

  /* Tabs */
  .tabs{ display:flex; gap:4px; margin:18px 0 0; border-bottom:1px solid var(--border); }
  .tab{ flex:1; background:none; border:none; color:var(--muted); font-size:15px; font-weight:600;
    padding:13px 8px; cursor:pointer; position:relative; }
  .tab.active{ color:var(--text); }
  .tab.active::after{ content:""; position:absolute; left:14px; right:14px; bottom:-1px; height:3px;
    border-radius:3px; background:var(--accent); }

  .pager{ overflow:hidden; }
  .track{ display:flex; width:200%; transition:transform .32s cubic-bezier(.22,.61,.36,1); will-change:transform; }
  .track.dragging{ transition:none; }
  .panel{ flex:0 0 50%; width:50%; align-self:flex-start; padding-top:18px; }

  /* Summary + stat tiles */
  .summary,.stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .summary{ margin-bottom:16px; }
  .stat-grid{ margin-bottom:14px; }
  .tile{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
  .tile-label{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
  .tile-value{ font-size:26px; font-weight:700; margin-top:6px; letter-spacing:-.02em; }
  .summary .tile:first-child .tile-value{ color:var(--accent); }
  .summary .tile:last-child  .tile-value{ color:var(--good); }

  /* Buttons */
  .btn{ font-size:16px; font-weight:600; border:none; border-radius:14px; padding:14px 16px; cursor:pointer; color:#fff; }
  .btn-primary{ background:var(--accent); }
  .btn-primary:active{ background:var(--accent-press); }
  .btn-block{ width:100%; }
  .btn-ghost{ background:transparent; color:var(--muted); border:1px solid var(--border); }

  /* Form panel */
  .panel-form{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-top:16px; }
  .panel-form h2{ margin:0 0 14px; font-size:17px; }
  .field{ margin-bottom:14px; }
  .field:last-of-type{ margin-bottom:0; }
  .lbl{ display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
  input[type=text],input[type=number],input[type=date]{
    width:100%; padding:13px 14px; font-size:16px;
    background:var(--surface-2); color:var(--text);
    border:1px solid var(--border); border-radius:12px; outline:none;
  }
  input:focus{ border-color:var(--accent); }
  .row2{ display:grid; grid-template-columns:1fr 92px; gap:12px; }

  .segment{ display:grid; grid-template-columns:1fr 1fr; gap:4px; padding:4px;
    background:var(--surface-2); border:1px solid var(--border); border-radius:12px; }
  .segment input{ position:absolute; opacity:0; pointer-events:none; }
  .segment label{ text-align:center; padding:10px; border-radius:9px; cursor:pointer;
    color:var(--muted); font-weight:600; font-size:15px; }
  .segment input:checked + label{ background:var(--accent); color:#fff; }

  .form-actions{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:18px; }

  /* List */
  .list-head{ display:flex; align-items:center; gap:10px; margin:26px 0 12px; }
  .list-head h2{ font-size:15px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:0; }
  .count{ font-size:12px; color:var(--muted); background:var(--surface-2);
    border:1px solid var(--border); border-radius:999px; padding:2px 9px; }

  .card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:12px; }
  .card.soon{ border-color:rgba(255,180,84,.55); box-shadow:inset 3px 0 0 var(--warn); }
  .card-row{ display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .card-name{ font-weight:600; font-size:17px; }
  .card-sub{ margin-top:5px; color:var(--text); font-size:14px; }
  .badge{ font-size:12px; font-weight:600; white-space:nowrap; color:var(--accent);
    background:rgba(124,108,255,.14); border-radius:999px; padding:4px 10px; }
  .badge-soon{ color:var(--warn); background:rgba(255,180,84,.15); }
  .card-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:12px; }
  .mini{ font-size:13px; font-weight:600; padding:7px 14px; border-radius:10px;
    background:var(--surface-2); color:var(--text); border:1px solid var(--border); cursor:pointer; }
  .mini.danger{ color:var(--danger); }

  .empty{ text-align:center; color:var(--muted); padding:34px 10px; border:1px dashed var(--border); border-radius:var(--radius); }

  /* Data backup */
  .data-actions{ display:flex; gap:10px; margin-top:26px; }
  .data-actions .btn{ flex:1; font-size:14px; padding:12px; }

  /* Insights charts */
  .chart-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:14px; }
  .chart-card h3{ margin:0 0 14px; font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); }
  .donut-wrap{ display:flex; gap:18px; align-items:center; flex-wrap:wrap; }
  .donut-wrap svg{ flex:none; }
  .legend{ flex:1; min-width:160px; display:flex; flex-direction:column; gap:9px; }
  .legend-item{ display:flex; align-items:center; gap:9px; font-size:14px; }
  .dot{ width:11px; height:11px; border-radius:3px; flex:none; }
  .legend-name{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .legend-val{ color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap; }
  .bar-row{ margin-bottom:13px; }
  .bar-row:last-child{ margin-bottom:0; }
  .bar-top{ display:flex; justify-content:space-between; gap:10px; font-size:14px; margin-bottom:6px; }
  .bar-top span:first-child{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bar-track{ height:10px; background:var(--surface-2); border-radius:6px; overflow:hidden; }
  .bar-fill{ height:100%; border-radius:6px; transition:width .3s ease; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Subscriptions</h1>
    <p>Your recurring costs at a glance</p>
  </header>

  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="0" role="tab">Subscriptions</button>
    <button class="tab" data-tab="1" role="tab">Insights</button>
  </div>

  <div id="pager" class="pager">
   <div id="track" class="track">
    <!-- ================= TAB 0: Subscriptions ================= -->
    <section class="panel" data-panel="0" role="tabpanel">
      <section class="summary" aria-label="Cost summary">
        <div class="tile">
          <div class="tile-label">Per month</div>
          <div class="tile-value" id="totMonthly">$0.00</div>
        </div>
        <div class="tile">
          <div class="tile-label">Per year</div>
          <div class="tile-value" id="totYearly">$0.00</div>
        </div>
      </section>

      <button id="addBtn" class="btn btn-primary btn-block">+ Add subscription</button>

      <section id="formPanel" class="panel-form" hidden>
        <h2 id="formTitle">Add subscription</h2>
        <form id="subForm">
          <div class="field">
            <label class="lbl" for="f-name">Name</label>
            <input id="f-name" type="text" required maxlength="60" autocomplete="off" placeholder="e.g. Netflix">
          </div>
          <div class="field">
            <label class="lbl" for="f-cost">Cost</label>
            <div class="row2">
              <input id="f-cost" type="number" inputmode="decimal" step="0.01" min="0" required placeholder="0.00">
              <input id="f-cur" type="text" maxlength="4" value="AUD" aria-label="Currency label">
            </div>
          </div>
          <div class="field">
            <label class="lbl">Billing cycle</label>
            <div class="segment">
              <input type="radio" name="cycle" id="cyc-m" value="monthly" checked>
              <label for="cyc-m">Monthly</label>
              <input type="radio" name="cycle" id="cyc-y" value="yearly">
              <label for="cyc-y">Yearly</label>
            </div>
          </div>
          <div class="field">
            <label class="lbl" for="f-next">Next payment</label>
            <input id="f-next" type="date" required>
          </div>
          <div class="form-actions">
            <button type="button" id="cancelBtn" class="btn btn-ghost">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </section>

      <div class="list-head">
        <h2>All subscriptions</h2>
        <span class="count" id="count">0</span>
      </div>
      <div id="list"></div>
      <p id="empty" class="empty" hidden>No subscriptions yet.<br>Tap “Add subscription” to start.</p>

      <div class="data-actions">
        <button id="exportBtn" class="btn btn-ghost">⤓ Export backup</button>
        <button id="importBtn" class="btn btn-ghost">⤒ Import backup</button>
        <input id="importFile" type="file" accept="application/json,.json" hidden>
      </div>
    </section>

    <!-- ================= TAB 1: Insights ================= -->
    <section class="panel" data-panel="1" role="tabpanel">
      <div id="insights"></div>
    </section>
   </div>
  </div>
</div>

<script>
"use strict";
const KEY = "subtracker.subs.v1";
const MS_DAY = 86400000;
const COLORS = ["#7c6cff","#4fd1a1","#ffb454","#ff6b6b","#4aa8ff","#f97cc4","#a0e34f","#ff9f5a","#5ce1e6","#c084fc"];

/* ---------- date helpers (all local-midnight, timezone-safe) ---------- */
const pad = n => String(n).padStart(2, "0");
const toISO = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
function parseISO(s){ const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); }
function daysInMonth(y, m){ return new Date(y, m+1, 0).getDate(); }   // m is 0-based
function startOfToday(){ const n = new Date(); return new Date(n.getFullYear(), n.getMonth(), n.getDate()); }

/* Advance one billing cycle. anchorDay is the *intended* day-of-month the user
   chose (e.g. 31), rebuilt each step and clamped to the target month's length —
   so the 31st lands on the last day of short months yet returns to the 31st in
   long ones, and Feb 29 handles leap years automatically. */
function addCycle(date, cycle, anchorDay){
  let y = date.getFullYear(), m = date.getMonth();
  if(cycle === "yearly"){ y += 1; }
  else { m += 1; if(m > 11){ m = 0; y += 1; } }
  return new Date(y, m, Math.min(anchorDay, daysInMonth(y, m)));
}
/* Step one cycle backwards (used to find the start of the current cycle). */
function subCycle(date, cycle, anchorDay){
  let y = date.getFullYear(), m = date.getMonth();
  if(cycle === "yearly"){ y -= 1; }
  else { m -= 1; if(m < 0){ m = 11; y -= 1; } }
  return new Date(y, m, Math.min(anchorDay, daysInMonth(y, m)));
}
/* Roll a subscription's next-payment date forward until it is today or later. */
function rolledDate(sub){
  const today = startOfToday();
  let date = parseISO(sub.next), guard = 0;
  while(date < today && guard++ < 100000){ date = addCycle(date, sub.cycle, sub.anchorDay); }
  return date;
}

function daysUntil(iso){ return Math.round((parseISO(iso) - startOfToday()) / MS_DAY); }
function dueLabel(days){
  if(days <= 0) return "Due today";
  if(days === 1) return "Tomorrow";
  return `in ${days} days`;
}
function fmtDate(iso){
  return parseISO(iso).toLocaleDateString("en-AU",
    { weekday:"short", day:"numeric", month:"short", year:"numeric" });
}
function money(n){ return "$" + n.toLocaleString("en-AU", { minimumFractionDigits:2, maximumFractionDigits:2 }); }
function esc(s){ return String(s).replace(/[&<>"']/g, c =>
  ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

const monthlyOf = s => s.cycle === "monthly" ? s.cost : s.cost / 12;
const yearlyOf  = s => s.cycle === "monthly" ? s.cost * 12 : s.cost;

/* How far through the current billing cycle we are (0..1), plus days left. */
function cycleProgress(s){
  const next = parseISO(s.next);
  const prev = subCycle(next, s.cycle, s.anchorDay);
  const today = startOfToday();
  const span = (next - prev) || 1;
  return { pct: Math.max(0, Math.min(1, (today - prev) / span)), daysLeft: daysUntil(s.next) };
}

/* ---------- data ---------- */
function newId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function mkSub(name, cost, currency, cycle, next){
  return { id:newId(), name, cost:Number(cost), currency:(currency || "AUD"), cycle, next, anchorDay:parseISO(next).getDate() };
}
function load(){
  const raw = localStorage.getItem(KEY);
  if(raw === null){                                  // first run — seed starting data
    const seed = [
      mkSub("Spotify", 15.99, "AUD", "monthly", "2026-07-07"),
      mkSub("TickTick", 52, "AUD", "yearly", "2026-12-15")
    ];
    localStorage.setItem(KEY, JSON.stringify(seed));
    return seed;
  }
  try { const a = JSON.parse(raw); return Array.isArray(a) ? a : []; }
  catch { return []; }
}
function save(){ localStorage.setItem(KEY, JSON.stringify(subs)); }

function normalize(){
  let changed = false;
  for(const s of subs){
    if(typeof s.anchorDay !== "number" || !s.anchorDay){ s.anchorDay = parseISO(s.next).getDate(); changed = true; }
    const rolled = toISO(rolledDate(s));
    if(rolled !== s.next){ s.next = rolled; changed = true; }
  }
  return changed;
}
function totals(){
  let monthly = 0, yearly = 0;
  for(const s of subs){
    if(s.cycle === "monthly"){ monthly += s.cost; yearly += s.cost * 12; }
    else { yearly += s.cost; monthly += s.cost / 12; }
  }
  return { monthly, yearly };
}

/* ---------- state + refs ---------- */
let subs = load();
let editingId = null;
let tab = 0;

const $ = id => document.getElementById(id);
const listEl = $("list"), emptyEl = $("empty"), countEl = $("count");
const panel = $("formPanel"), addBtn = $("addBtn"), form = $("subForm"), formTitle = $("formTitle");
const nameEl = $("f-name"), costEl = $("f-cost"), curEl = $("f-cur"), nextEl = $("f-next");
const pager = $("pager"), track = $("track");

/* ---------- render: subscriptions list ---------- */
function render(){
  if(normalize()) save();

  const t = totals();
  $("totMonthly").textContent = money(t.monthly);
  $("totYearly").textContent  = money(t.yearly);
  countEl.textContent = subs.length;

  const sorted = [...subs].sort((a, b) => a.next < b.next ? -1 : a.next > b.next ? 1 : 0);
  emptyEl.hidden = sorted.length > 0;

  listEl.innerHTML = sorted.map(s => {
    const days = daysUntil(s.next);
    const soon = days <= 3;
    const unit = s.cycle === "monthly" ? "mo" : "yr";
    const other = s.cycle === "monthly" ? yearlyOf(s) : monthlyOf(s);
    const otherUnit = s.cycle === "monthly" ? "yr" : "mo";
    const cur = s.currency && s.currency !== "AUD" ? " " + esc(s.currency) : "";
    return `<article class="card${soon ? " soon" : ""}" data-id="${s.id}">
      <div class="card-row">
        <span class="card-name">${esc(s.name)}</span>
        <span class="badge${soon ? " badge-soon" : ""}">${dueLabel(days)}</span>
      </div>
      <div class="card-row card-sub">
        <span>${money(s.cost)}${cur}/${unit} · <span class="muted">${money(other)}/${otherUnit}</span></span>
        <span class="muted">${fmtDate(s.next)}</span>
      </div>
      <div class="card-actions">
        <button class="mini" data-act="edit">Edit</button>
        <button class="mini danger" data-act="del">Delete</button>
      </div>
    </article>`;
  }).join("");

  renderInsights();
  setPagerHeight();
}

/* ---------- render: insights charts ---------- */
function statTile(label, val, color){
  return `<div class="tile"><div class="tile-label">${label}</div>
    <div class="tile-value" style="color:${color};font-size:22px">${val}</div></div>`;
}
function donutSVG(items, total){
  const cx = 70, cy = 70, r = 52, sw = 20, C = 2 * Math.PI * r;
  let off = 0, segs = "";
  if(total > 0){
    for(const it of items){
      if(it.value <= 0) continue;
      const len = it.value / total * C;
      segs += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${it.color}" stroke-width="${sw}"
        stroke-dasharray="${len.toFixed(2)} ${(C - len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}"
        transform="rotate(-90 ${cx} ${cy})"/>`;
      off += len;
    }
  }
  return `<svg viewBox="0 0 140 140" width="132" height="132" role="img" aria-label="Spending by subscription">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface-2)" stroke-width="${sw}"/>
    ${segs}
    <text x="70" y="66" text-anchor="middle" fill="var(--text)" font-size="16" font-weight="700">${money(total)}</text>
    <text x="70" y="83" text-anchor="middle" fill="var(--muted)" font-size="10">/ month</text>
  </svg>`;
}
function renderInsights(){
  const wrap = $("insights");
  if(!subs.length){
    wrap.innerHTML = `<p class="empty">Add a subscription to see spending insights.</p>`;
    return;
  }

  const t = totals();
  const due30 = subs.filter(s => daysUntil(s.next) <= 30).reduce((a, s) => a + s.cost, 0);

  // stable colour per subscription
  const color = {};
  subs.forEach((s, i) => color[s.id] = COLORS[i % COLORS.length]);

  // Donut: share of monthly spend
  const items = subs.map(s => ({ name:s.name, value:monthlyOf(s), color:color[s.id] }));
  const totalM = items.reduce((a, b) => a + b.value, 0);
  const legend = items.map(it => {
    const pct = totalM > 0 ? Math.round(it.value / totalM * 100) : 0;
    return `<div class="legend-item"><span class="dot" style="background:${it.color}"></span>
      <span class="legend-name">${esc(it.name)}</span>
      <span class="legend-val">${money(it.value)}/mo · ${pct}%</span></div>`;
  }).join("");

  // Billing-cycle progress bars, soonest due first
  const byDue = [...subs].sort((a, b) => daysUntil(a.next) - daysUntil(b.next));
  const progBars = byDue.map(s => {
    const { pct, daysLeft } = cycleProgress(s);
    const p = Math.round(pct * 100);
    const label = daysLeft <= 0 ? "Due today" : `${daysLeft} day${daysLeft === 1 ? "" : "s"} left`;
    return `<div class="bar-row"><div class="bar-top"><span>${esc(s.name)}</span>
      <span class="legend-val">${label} · ${p}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max(3, p)}%;background:${color[s.id]}"></div></div></div>`;
  }).join("");

  wrap.innerHTML =
    `<div class="stat-grid">
      ${statTile("Per month", money(t.monthly), "var(--accent)")}
      ${statTile("Per year", money(t.yearly), "var(--good)")}
      ${statTile("Due in 30 days", money(due30), "var(--warn)")}
      ${statTile("Subscriptions", String(subs.length), "var(--text)")}
    </div>
    <div class="chart-card"><h3>Spending breakdown</h3>
      <div class="donut-wrap">${donutSVG(items, totalM)}<div class="legend">${legend}</div></div></div>
    <div class="chart-card"><h3>Billing cycle progress</h3>${progBars}</div>`;
}

/* ---------- tabs + swipe pager (finger-tracking) ---------- */
function panelMaxHeight(){ return Math.max(track.children[0].offsetHeight, track.children[1].offsetHeight); }
function setPagerHeight(h){ pager.style.height = (h != null ? h : track.children[tab].offsetHeight) + "px"; }

function setTab(i){
  i = Math.max(0, Math.min(track.children.length - 1, i));
  const changed = i !== tab;
  tab = i;
  track.style.transform = `translateX(-${i * 50}%)`;
  document.querySelectorAll(".tab").forEach((t, idx) => t.classList.toggle("active", idx === i));
  setPagerHeight(panelMaxHeight());                    // hold tallest during the slide so nothing clips
  clearTimeout(setTab._t);
  setTab._t = setTimeout(() => setPagerHeight(), 340); // settle to the active panel's height
  if(changed) window.scrollTo({ top:0, behavior:"smooth" });
}
document.querySelectorAll(".tab").forEach(t =>
  t.addEventListener("click", () => setTab(Number(t.dataset.tab))));

let startX = 0, startY = 0, dragging = false, decided = false, horiz = false, w = 1;
pager.addEventListener("touchstart", e => {
  if(e.target.closest("input,textarea,select,button,a,label")){ dragging = false; return; }
  const t = e.touches[0];
  startX = t.clientX; startY = t.clientY; w = pager.clientWidth || 1;
  dragging = true; decided = false; horiz = false;
}, { passive:true });
pager.addEventListener("touchmove", e => {
  if(!dragging) return;
  const t = e.touches[0], dx = t.clientX - startX, dy = t.clientY - startY;
  if(!decided){                                        // wait until intent is clear, then commit
    if(Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    decided = true; horiz = Math.abs(dx) > Math.abs(dy);
    if(horiz){ track.classList.add("dragging"); setPagerHeight(panelMaxHeight()); }
    else { dragging = false; return; }                 // vertical → let the page scroll
  }
  if(horiz){
    e.preventDefault();
    let tx = -tab * w + dx;
    const min = -(track.children.length - 1) * w;
    if(tx > 0) tx *= 0.35;                              // rubber-band past the edges
    else if(tx < min) tx = min + (tx - min) * 0.35;
    track.style.transform = `translateX(${tx}px)`;
  }
}, { passive:false });
pager.addEventListener("touchend", e => {
  if(!dragging) return;
  dragging = false; track.classList.remove("dragging");
  if(!horiz) return;
  const dx = e.changedTouches[0].clientX - startX;
  let target = tab;
  if(dx <= -w * 0.18) target = tab + 1;                // easy to trigger: 18% of the width
  else if(dx >= w * 0.18) target = tab - 1;
  setTab(target);                                       // snaps forward or springs back
}, { passive:true });

window.addEventListener("resize", () => {
  track.style.transition = "none";
  track.style.transform = `translateX(-${tab * 50}%)`;
  setPagerHeight();
  requestAnimationFrame(() => { track.style.transition = ""; });
});

/* ---------- form open/close ---------- */
function openForm(id){
  editingId = id || null;
  if(editingId){
    const s = subs.find(x => x.id === editingId);
    formTitle.textContent = "Edit subscription";
    nameEl.value = s.name; costEl.value = s.cost; curEl.value = s.currency;
    form.cycle.value = s.cycle; nextEl.value = s.next;
  } else {
    formTitle.textContent = "Add subscription";
    form.reset(); curEl.value = "AUD"; form.cycle.value = "monthly";
    nextEl.value = toISO(startOfToday());
  }
  panel.hidden = false; addBtn.hidden = true; nameEl.focus();
  panel.scrollIntoView({ behavior:"smooth", block:"nearest" });
}
function closeForm(){ panel.hidden = true; addBtn.hidden = false; editingId = null; }

/* ---------- events ---------- */
addBtn.addEventListener("click", () => openForm());
$("cancelBtn").addEventListener("click", closeForm);

form.addEventListener("submit", e => {
  e.preventDefault();
  if(!form.reportValidity()) return;
  const name = nameEl.value.trim();
  const cost = parseFloat(costEl.value);
  const currency = (curEl.value.trim() || "AUD").toUpperCase();
  const cycle = form.cycle.value;
  const next = nextEl.value;
  if(!name || isNaN(cost) || !next) return;

  if(editingId){
    const s = subs.find(x => x.id === editingId);
    Object.assign(s, { name, cost, currency, cycle, next, anchorDay: parseISO(next).getDate() });
  } else {
    subs.push(mkSub(name, cost, currency, cycle, next));
  }
  save(); render(); closeForm();
});

listEl.addEventListener("click", e => {
  const btn = e.target.closest("button[data-act]");
  if(!btn) return;
  const id = e.target.closest("[data-id]").dataset.id;
  if(btn.dataset.act === "edit"){ openForm(id); return; }
  const s = subs.find(x => x.id === id);
  if(s && confirm(`Delete “${s.name}”?`)){
    subs = subs.filter(x => x.id !== id);
    if(editingId === id) closeForm();
    save(); render();
  }
});

/* ---------- backup: export / import ---------- */
$("exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(subs, null, 2)], { type:"application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const d = new Date();
  a.href = url;
  a.download = `subscriptions-backup-${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
});
$("importBtn").addEventListener("click", () => $("importFile").click());
$("importFile").addEventListener("change", e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      if(!Array.isArray(data)) throw 0;
      const clean = data
        .filter(x => x && typeof x.name === "string" && x.next && (x.cycle === "monthly" || x.cycle === "yearly"))
        .map(x => ({
          id: x.id || newId(),
          name: String(x.name).slice(0, 60),
          cost: Number(x.cost) || 0,
          currency: (x.currency || "AUD"),
          cycle: x.cycle,
          next: x.next,
          anchorDay: Number(x.anchorDay) || parseISO(x.next).getDate()
        }));
      if(!clean.length){ alert("That file didn’t contain any valid subscriptions."); return; }
      if(confirm(`Import ${clean.length} subscription(s)? This replaces your current list.`)){
        subs = clean; save(); render();
      }
    }catch(_){ alert("Could not read that backup file."); }
  };
  reader.readAsText(file);
  e.target.value = "";   // allow re-importing the same file
});

// Keep "days remaining" / roll-forward fresh if the app is left open past midnight.
document.addEventListener("visibilitychange", () => { if(!document.hidden) render(); });

/* ---------- home-screen icon (generated so the file stays self-contained) ---------- */
function setupIcon(){
  try{
    const c = document.createElement("canvas");
    c.width = c.height = 512;
    const g = c.getContext("2d");
    const grad = g.createLinearGradient(0, 0, 512, 512);
    grad.addColorStop(0, "#8b5cff"); grad.addColorStop(1, "#5b7cff");
    g.fillStyle = grad; g.fillRect(0, 0, 512, 512);
    g.fillStyle = "#fff";
    g.font = "700 300px -apple-system, system-ui, sans-serif";
    g.textAlign = "center"; g.textBaseline = "middle";
    g.fillText("$", 256, 280);
    const png = c.toDataURL("image/png");

    const link = (rel, href) => { const l = document.createElement("link"); l.rel = rel; l.href = href; document.head.appendChild(l); };
    link("apple-touch-icon", png);
    link("icon", png);

    const base = location.href.split(/[?#]/)[0];
    const manifest = {
      name:"Subscriptions", short_name:"Subs",
      start_url: base, scope: base.replace(/[^/]*$/, ""),
      display:"standalone", background_color:"#0d0f14", theme_color:"#0d0f14",
      icons:[
        { src:png, sizes:"512x512", type:"image/png", purpose:"any" },
        { src:png, sizes:"512x512", type:"image/png", purpose:"maskable" }
      ]
    };
    const url = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type:"application/manifest+json" }));
    link("manifest", url);
  }catch(_){ /* icon is a nice-to-have; ignore if unsupported */ }
}

setupIcon();
render();
</script>
